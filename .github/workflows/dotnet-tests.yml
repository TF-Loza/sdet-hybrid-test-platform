name: .NET Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Install Playwright browsers
        run: pwsh UiTests/bin/Release/net10.0/playwright.ps1 install --with-deps

      - name: Run API tests
        run: dotnet test ApiTests/ApiTests.csproj --configuration Release --no-build

      - name: Run UI tests
        run: dotnet test UiTests/UiTests.csproj --configuration Release --no-build

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: |
            **/Screenshots/**